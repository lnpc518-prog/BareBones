<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chore App</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  margin: 20px;
  background: #f2f2f7;
  touch-action: manipulation;
  color: #111;
}

h2 {
  text-align: center;
  font-weight: 600;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  margin-bottom: 10px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 10px;
  box-sizing: border-box;
  outline: none;
}

/* 🍏 BUTTON BASE */
button {
  padding: 10px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #e5e5ea;
  color: #111;

  -webkit-tap-highlight-color: transparent;

  /* smoother feel */
  transition: transform 0.08s ease, opacity 0.12s ease, background 0.12s ease;
}

/* 🔥 REAL PRESS FEEDBACK */
button:active {
  transform: scale(0.96);
  opacity: 0.55;
  background: #d1d1d6;
}

/* 🍎 iOS STYLE RESET BUTTON */
.reset-btn {
  width: 100%;
  display: block;
  margin-top: 10px;
  padding: 14px;
  border-radius: 14px;
  background: #ff3b30;
  color: white;
  font-weight: 600;
  box-shadow: 0 4px 10px rgba(255, 59, 48, 0.25);
}

/* floating add button */
.floating-add {
  position: fixed;
  top: 15px;
  right: 15px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  font-size: 22px;
  background: #ffffff;
  border: 1px solid #ddd;
  z-index: 9999;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

/* chores */
.chore {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  border-bottom: 1px solid #eee;
  gap: 10px;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}

.count {
  width: 30px;
  font-weight: 600;
  text-align: center;
}

.name {
  flex: 1;
  overflow-wrap: anywhere;
}

.value {
  font-size: 13px;
  color: #666;
}

.actions {
  display: flex;
  gap: 5px;
}

.actions button {
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<button class="floating-add" onclick="focusAdd()">+</button>

<div class="box">
  <h2>Balance: $<span id="balance">0.00</span></h2>
  <button class="reset-btn" onclick="resetDay()">Reset Day</button>
</div>

<div class="box">
  <h3>Chores</h3>
  <div id="choreList"></div>
</div>

<div class="box">
  <h3>Add Chore</h3>
  <input id="name" placeholder="Chore name">
  <input id="amount" placeholder="Amount ($)">
  <button onclick="addChore()">Add</button>
</div>

<script>
let balance = 0;
let chores = [];

function save() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("chores", JSON.stringify(chores));
}

function load() {
  balance = parseFloat(localStorage.getItem("balance")) || 0;
  chores = JSON.parse(localStorage.getItem("chores")) || [];
}

function format(n) {
  return Number(n).toFixed(2);
}

function render() {
  document.getElementById("balance").innerText = format(balance);

  const list = document.getElementById("choreList");
  list.innerHTML = "";

  chores.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "chore";

    div.innerHTML = `
      <div class="left">
        <div class="count">${c.count || 0}</div>
        <div class="name">${c.name}</div>
        <div class="value">$${format(c.amount)}</div>
      </div>

      <div class="actions">
        <button onclick="add(${i})">+</button>
        <button onclick="remove(${i})">-</button>
        <button onclick="deleteChore(${i})">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });
}

function addChore() {
  const name = document.getElementById("name").value;
  const amount = parseFloat(document.getElementById("amount").value);

  if (!name || isNaN(amount)) return;

  chores.push({ name, amount, count: 0 });

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";

  save();
  render();
}

function add(i) {
  chores[i].count++;
  balance += chores[i].amount;
  save();
  render();
}

function remove(i) {
  if (chores[i].count > 0) {
    chores[i].count--;
    balance -= chores[i].amount;
  }
  save();
  render();
}

function deleteChore(i) {
  const ok = confirm("Delete this chore?");
  if (!ok) return;
  chores.splice(i, 1);
  save();
  render();
}

function resetDay() {
  const ok = confirm("Reset everything for today?");
  if (!ok) return;

  balance = 0;
  chores.forEach(c => c.count = 0);

  save();
  render();
}

function focusAdd() {
  document.getElementById("name").focus();
}

load();
render();
</script>

</body>
</html>
