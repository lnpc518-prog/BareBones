<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chore App</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Arial;
  margin: 20px;
  background: #f2f2f7;
  color: #111;
}

/* iOS CARD STYLE */
.box {
  background: #fff;
  padding: 15px;
  border-radius: 18px;
  margin-bottom: 15px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin-top: 8px;
  margin-bottom: 10px;
  outline: none;
}

/* 🍏 iOS BUTTON BASE */
button {
  padding: 10px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  background: #e5e5ea;
  color: #111;

  -webkit-tap-highlight-color: transparent;

  transform: translateZ(0);
  transition: transform 180ms cubic-bezier(.2,.8,.2,1),
              opacity 180ms ease,
              background 180ms ease;
}

/* ✨ iPHONE TAP FEEL (key upgrade) */
button.is-pressed {
  transform: scale(0.92);
  opacity: 0.55;
}

/* iOS RED BUTTON */
.reset-btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  background: #e5e5ea;
  font-weight: 600;
}

/* FLOATING BUTTON */
.floating-add {
  position: fixed;
  top: 16px;
  right: 16px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  font-size: 24px;
  background: white;
  border: 1px solid #ddd;
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
}

/* LIST */
.chore {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.left {
  display: flex;
  gap: 10px;
  flex: 1;
}

.count {
  width: 30px;
  text-align: center;
  font-weight: 600;
}

.name {
  flex: 1;
}

.value {
  font-size: 13px;
  color: #666;
}

.actions {
  display: flex;
  gap: 6px;
}

.actions button {
  padding: 8px 10px;
  border-radius: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<button class="floating-add" onclick="focusAdd()">+</button>

<div class="box">
  <h2>Balance: $<span id="balance">0.00</span></h2>
  <button class="reset-btn" onclick="resetDay()">Reset Day</button>
</div>

<div class="box">
  <h3>Chores</h3>
  <div id="choreList"></div>
</div>

<div class="box">
  <h3>Add Chore</h3>
  <input id="name" placeholder="Chore name">
  <input id="amount" placeholder="Amount">
  <button onclick="addChore()">Add</button>
</div>

<script>
let balance = 0;
let chores = [];

function save() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("chores", JSON.stringify(chores));
}

function load() {
  balance = parseFloat(localStorage.getItem("balance")) || 0;
  chores = JSON.parse(localStorage.getItem("chores")) || [];
}

function format(n) {
  return Number(n).toFixed(2);
}

/* 🍏 REAL iOS PRESS FEEL */
function addIOSPress(el) {
  if (el.dataset.bound) return;
  el.dataset.bound = "true";

  el.addEventListener("pointerdown", () => {
    el.classList.add("is-pressed");
  });

  const up = () => el.classList.remove("is-pressed");

  el.addEventListener("pointerup", up);
  el.addEventListener("pointercancel", up);
  el.addEventListener("pointerleave", up);
}

function render() {
  document.getElementById("balance").innerText = format(balance);

  const list = document.getElementById("choreList");
  list.innerHTML = "";

  chores.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "chore";

    div.innerHTML = `
      <div class="left">
        <div class="count">${c.count || 0}</div>
        <div class="name">${c.name}</div>
        <div class="value">$${format(c.amount)}</div>
      </div>

      <div class="actions">
        <button onclick="add(${i})">+</button>
        <button onclick="remove(${i})">-</button>
        <button onclick="deleteChore(${i})">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });

  requestAnimationFrame(() => {
    document.querySelectorAll("button").forEach(addIOSPress);
  });
}

/* ACTIONS */
function addChore() {
  const name = document.getElementById("name").value;
  const amount = parseFloat(document.getElementById("amount").value);
  if (!name || isNaN(amount)) return;

  chores.push({ name, amount, count: 0 });

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";

  save();
  render();
}

function add(i) {
  chores[i].count++;
  balance += chores[i].amount;
  save();
  render();
}

function remove(i) {
  if (chores[i].count > 0) {
    chores[i].count--;
    balance -= chores[i].amount;
  }
  save();
  render();
}

function deleteChore(i) {
  if (!confirm("Delete this chore?")) return;
  chores.splice(i, 1);
  save();
  render();
}

function resetDay() {
  if (!confirm("Reset everything for today?")) return;

  balance = 0;
  chores.forEach(c => c.count = 0);

  save();
  render();
}

function focusAdd() {
  document.getElementById("name").focus();
}

load();
render();
</script>

</body>
</html>
