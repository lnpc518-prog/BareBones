<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chore App</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  margin: 20px;
  background: #f2f2f7;
  color: #111;
}

/* CARD */
.box {
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 10px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ddd;
  box-sizing: border-box;
}

/* BUTTON */
button {
  padding: 10px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #e5e5ea;
  color: #111;
  -webkit-tap-highlight-color: transparent;
  transition: transform 90ms ease, opacity 90ms ease;
}

/* RESET */
.reset-btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  background: #e5e5ea !important;
  font-weight: 600;
}

/* FLOATING + */
.floating-add {
  position: fixed;
  top: 15px;
  right: 15px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: white;
  border: 1px solid #ddd;
  font-size: 22px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
}

/* ===== ROW ===== */

.chore {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;

  padding: 12px;
  border-bottom: 1px solid #eee;

  gap: 10px;
}

/* LEFT SIDE */
.left {
  display: flex;
  align-items: center;
  gap: 10px;

  flex: 1;
  min-width: 0;
}

/* COUNT */
.count {
  width: 30px;
  text-align: center;
  font-weight: 600;
  flex-shrink: 0;
}

/* NAME (SHRINKS CLEANLY) */
.name {
  flex: 1;
  min-width: 0;

  font-size: 15px;
  font-weight: 500;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* RIGHT SIDE (FIXED WIDTH TO PREVENT CUT OFF) */
.right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;

  flex-shrink: 0;

  /* 🔥 KEY FIX */
  min-width: 120px;
}

/* MONEY */
.value {
  font-size: 14px;
  font-weight: 500;
  color: #3a3a3c;

  white-space: nowrap;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
}

.actions button {
  padding: 8px 10px;
  border-radius: 10px;
  font-size: 14px;
  white-space: nowrap;
}

/* PRESS EFFECT */
.pressed {
  transform: scale(0.94);
  opacity: 0.6;
}
</style>
</head>

<body>

<button class="floating-add" onclick="focusAdd()">+</button>

<div class="box">
  <h2>Balance: $<span id="balance">0.00</span></h2>
  <button class="reset-btn" onclick="resetDay(event)">Reset Day</button>
</div>

<div class="box">
  <h3>Chores</h3>
  <div id="choreList"></div>
</div>

<div class="box">
  <h3>Add Chore</h3>
  <input id="name" placeholder="Chore name">
  <input id="amount" placeholder="Amount ($)">
  <button onclick="addChore(event)">Add</button>
</div>

<script>
let balance = 0;
let chores = [];

function save() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("chores", JSON.stringify(chores));
}

function load() {
  balance = parseFloat(localStorage.getItem("balance")) || 0;
  chores = JSON.parse(localStorage.getItem("chores")) || [];
}

function format(n) {
  return Number(n).toFixed(2);
}

function press(el) {
  el.classList.add("pressed");
  setTimeout(() => el.classList.remove("pressed"), 120);
}

function render() {
  document.getElementById("balance").innerText = format(balance);

  const list = document.getElementById("choreList");
  list.innerHTML = "";

  chores.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "chore";

    div.innerHTML = `
      <div class="left">
        <div class="count">${c.count || 0}</div>
        <div class="name">${c.name}</div>
      </div>

      <div class="right">
        <div class="value">$${format(c.amount)}</div>

        <div class="actions">
          <button onclick="press(this); add(${i})">+</button>
          <button onclick="press(this); remove(${i})">-</button>
          <button onclick="press(this); deleteChore(${i})">Del</button>
        </div>
      </div>
    `;

    list.appendChild(div);
  });
}

function addChore(e) {
  press(e.target);

  const name = document.getElementById("name").value;
  const amount = parseFloat(document.getElementById("amount").value);

  if (!name || isNaN(amount)) return;

  chores.push({ name, amount, count: 0 });

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";

  save();
  render();
}

function add(i) {
  chores[i].count++;
  balance += chores[i].amount;
  save();
  render();
}

function remove(i) {
  if (chores[i].count > 0) {
    chores[i].count--;
    balance -= chores[i].amount;
  }
  save();
  render();
}

function deleteChore(i) {
  if (!confirm("Delete this chore?")) return;
  chores.splice(i, 1);
  save();
  render();
}

function resetDay(e) {
  press(e.target);

  if (!confirm("Reset everything for today?")) return;

  balance = 0;
  chores.forEach(c => c.count = 0);

  save();
  render();
}

function focusAdd() {
  document.getElementById("name").focus();
}

load();
render();
</script>

</body>
</html>
