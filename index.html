<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chore Money">

  <title>Chore Earnings</title>
  <link rel="apple-touch-icon" href="icon.svg">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
      touch-action: manipulation;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      padding: 10px;
      font-size: 16px;
      margin-top: 5px;
      border: none;
      border-radius: 8px;
      background: #e9e9e9;
      color: #222;
      -webkit-tap-highlight-color: transparent;
      transition: transform .10s ease, opacity .10s ease, background-color .10s ease;
    }

    .pressed {
      transform: scale(0.95);
      opacity: .7;
      background: #dcdcdc;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .top-row {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .reset-btn {
      background: #eeeeee;
      border: 1px solid #ddd;
    }

    .chore {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid #eee;
      border-radius: 10px;
      background: white;
      transition: transform .15s ease, background .15s ease;
    }

    .chore,
    .chore * {
      user-select: none;
      -webkit-user-select: none;
    }

    .chore.swiping {
      background: #fff1f1;
    }

    .handle {
      width: 28px;
      flex-shrink: 0;
      padding: 6px 0;
      font-size: 18px;
      background: transparent;
      color: #777;
      margin-top: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .count {
      width: 35px;
      text-align: center;
      font-weight: bold;
      flex-shrink: 0;
    }

    .name {
      flex: 1;
      min-width: 0;
      font-size: 15px;
      white-space: normal;
      overflow-wrap: anywhere;
      line-height: 1.2;
    }

    .value {
      font-size: 14px;
      color: #444;
      flex-shrink: 0;
    }

    .actions {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    .actions button {
      min-width: 38px;
    }

    .floating-add {
      position: fixed;
      top: 15px;
      right: 15px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 22px;
      padding: 0;
      z-index: 9999;
      background: #e9e9e9;
      color: #222;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 10000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 15px;
      box-sizing: border-box;
    }

    .menu {
      background: white;
      width: 100%;
      max-width: 420px;
      border-radius: 22px;
      padding: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    .menu-grabber {
      width: 48px;
      height: 5px;
      background: #d8d8d8;
      border-radius: 99px;
      margin: 4px auto 12px;
    }

.menu button {
  width: 100%;
  height: 86px;
  margin: 6px 0;
  padding: 0;
  border-radius: 16px;

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 54px;
  font-weight: 700;
  line-height: 1;
}
    .cancel-btn {
      margin-top: 18px !important;
      font-size: 18px !important;
      font-weight: bold;
      padding: 16px !important;
    }
  </style>
</head>

<body>

<button class="floating-add" onclick="pressAndRun(this, focusAdd)">+</button>

<div class="box">
  <div class="header">
    <div class="top-row">
      <h2>Balance: $<span id="balance">0.00</span></h2>
    </div>
    <button class="reset-btn" onclick="pressAndRun(this, resetDay)">Reset Day</button>
  </div>
</div>

<div class="box">
  <h3>Chores</h3>
  <div id="choreList"></div>
</div>

<div class="box">
  <h3>Add Chore</h3>
  <input id="name" placeholder="Chore name">
  <input id="amount" placeholder="Amount ($)">
  <button onclick="pressAndRun(this, addChore)">Add</button>
</div>

<script>
let balance = 0;
let chores = [];

function press(btn) {
  btn.classList.add("pressed");
  setTimeout(() => {
    btn.classList.remove("pressed");
  }, 120);
}

function pressAndRun(btn, action) {
  press(btn);
  setTimeout(action, 90);
}

function loadData() {
  const savedBalance = localStorage.getItem("balance");
  const savedChores = localStorage.getItem("chores");

  balance = savedBalance !== null ? parseFloat(savedBalance) : 0;
  chores = savedChores !== null ? JSON.parse(savedChores) : [];
}

function saveData() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("chores", JSON.stringify(chores));
}

function formatMoney(n) {
  return Number(n).toFixed(2);
}

function shrinkName(el) {
  const sizes = [15, 14, 13, 12];

  for (let size of sizes) {
    el.style.fontSize = size + "px";
    if (el.scrollHeight <= el.clientHeight + 2) {
      break;
    }
  }
}

function openMoveMenu(i) {
  closeMoveMenu();

  let backdrop = document.createElement("div");
  backdrop.className = "menu-backdrop";
  backdrop.id = "moveMenu";

  backdrop.innerHTML = `
    <div class="menu">
      <div class="menu-grabber"></div>
      <button onclick="moveChoreUp(${i})"><span>˄</span></button>
<button onclick="moveChoreDown(${i})"><span>˅</span></button>
      <button class="cancel-btn" onclick="closeMoveMenu()">Cancel</button>
    </div>
  `;

  backdrop.addEventListener("click", function(e) {
    if (e.target === backdrop) closeMoveMenu();
  });

  document.body.appendChild(backdrop);
}

function closeMoveMenu() {
  let menu = document.getElementById("moveMenu");
  if (menu) menu.remove();
}

function moveChoreUp(i) {
  if (i <= 0) {
    closeMoveMenu();
    return;
  }

  let temp = chores[i - 1];
  chores[i - 1] = chores[i];
  chores[i] = temp;

  saveData();
  closeMoveMenu();
  updateUI();
}

function moveChoreDown(i) {
  if (i >= chores.length - 1) {
    closeMoveMenu();
    return;
  }

  let temp = chores[i + 1];
  chores[i + 1] = chores[i];
  chores[i] = temp;

  saveData();
  closeMoveMenu();
  updateUI();
}

function addSwipeDelete(row, i) {
  let startX = 0;
  let currentX = 0;
  let swiping = false;

  row.addEventListener("touchstart", function(e) {
    if (e.target.tagName === "BUTTON") return;

    startX = e.touches[0].clientX;
    currentX = startX;
    swiping = true;
  }, { passive: true });

  row.addEventListener("touchmove", function(e) {
    if (!swiping) return;

    currentX = e.touches[0].clientX;
    let diff = currentX - startX;

    if (diff < 0) {
      e.preventDefault();
      let move = Math.max(diff, -90);
      row.style.transform = `translateX(${move}px)`;
      row.classList.add("swiping");
    }
  }, { passive: false });

  row.addEventListener("touchend", function() {
    if (!swiping) return;

    let diff = currentX - startX;
    swiping = false;

    row.style.transform = "translateX(0)";
    row.classList.remove("swiping");

    if (diff < -80) {
      deleteChore(i);
    }
  });
}

function updateUI() {
  document.getElementById("balance").innerText = formatMoney(balance);

  let list = document.getElementById("choreList");
  list.innerHTML = "";

  chores.forEach((c, i) => {
    let div = document.createElement("div");
    div.className = "chore";

    div.innerHTML = `
      <button class="handle" onclick="press(this); openMoveMenu(${i})">☰</button>

      <div class="left">
        <div class="count">${c.count || 0}</div>
        <div class="name">${c.name}</div>
        <div class="value">$${formatMoney(c.amount)}</div>
      </div>

      <div class="actions">
        <button onclick="pressAndRun(this, function(){ logChore(${i}); })">+</button>
        <button onclick="pressAndRun(this, function(){ undoChore(${i}); })">-</button>
      </div>
    `;

    list.appendChild(div);
    shrinkName(div.querySelector(".name"));
    addSwipeDelete(div, i);
  });
}

function focusAdd() {
  document.getElementById("name").focus();
}

function addChore() {
  let name = document.getElementById("name").value;
  let amount = parseFloat(document.getElementById("amount").value);

  if (!name || isNaN(amount)) return;

  chores.push({ name, amount, count: 0 });

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";

  saveData();
  updateUI();
}

function logChore(i) {
  chores[i].count = (chores[i].count || 0) + 1;
  balance += chores[i].amount;

  saveData();
  updateUI();
}

function undoChore(i) {
  if ((chores[i].count || 0) > 0) {
    chores[i].count -= 1;
    balance -= chores[i].amount;
  }

  saveData();
  updateUI();
}

function deleteChore(i) {
  let c = chores[i];
  let confirmed = confirm(`Delete "${c.name}"? This cannot be undone.`);
  if (!confirmed) return;

  chores.splice(i, 1);

  saveData();
  updateUI();
}

function resetDay() {
  let confirmed = confirm("Reset today? This will set balance and all counts back to 0.");
  if (!confirmed) return;

  balance = 0;
  chores.forEach(c => c.count = 0);

  saveData();
  updateUI();
}

loadData();
updateUI();
</script>

</body>
</html>
