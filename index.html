<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chore App</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  margin: 20px;
  background: #f2f2f7;
  color: #111;
  touch-action: manipulation;
  overflow-x: hidden;
}

h2 { text-align: center; font-weight: 600; }

.box {
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  margin-bottom: 10px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 10px;
  box-sizing: border-box;
}

/* buttons (no animation needed anymore) */
button {
  padding: 10px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #e5e5ea;
  color: #111;
  -webkit-tap-highlight-color: transparent;
}

/* reset button */
.reset-btn {
  width: 100%;
  display: block;
  margin-top: 10px;
  padding: 14px;
  border-radius: 14px;
  background: #ff3b30;
  color: white;
  font-weight: 600;
  box-shadow: 0 4px 10px rgba(255, 59, 48, 0.25);
}

/* floating add */
.floating-add {
  position: fixed;
  top: 15px;
  right: 15px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  font-size: 22px;
  background: #fff;
  border: 1px solid #ddd;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

/* ripple effect layer */
.ripple {
  position: fixed;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(0,0,0,0.12);
  transform: scale(0);
  animation: rippleAnim 350ms ease-out;
  pointer-events: none;
  z-index: 9999;
}

@keyframes rippleAnim {
  to {
    transform: scale(2.5);
    opacity: 0;
  }
}

.box {
  display: block;
}

.chore {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
  gap: 10px;
}

.left {
  display: flex;
  gap: 10px;
  flex: 1;
}

.count { width: 30px; text-align: center; font-weight: 600; }
.name { flex: 1; }
.value { font-size: 13px; color: #666; }

.actions {
  display: flex;
  gap: 5px;
}

.actions button {
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<button class="floating-add" onclick="focusAdd(event)">+</button>

<div class="box">
  <h2>Balance: $<span id="balance">0.00</span></h2>
  <button class="reset-btn" onclick="resetDay(event)">Reset Day</button>
</div>

<div class="box">
  <h3>Chores</h3>
  <div id="choreList"></div>
</div>

<div class="box">
  <h3>Add Chore</h3>
  <input id="name">
  <input id="amount">
  <button onclick="addChore(event)">Add</button>
</div>

<script>
let balance = 0;
let chores = [];

function save() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("chores", JSON.stringify(chores));
}

function load() {
  balance = parseFloat(localStorage.getItem("balance")) || 0;
  chores = JSON.parse(localStorage.getItem("chores")) || [];
}

function format(n) {
  return Number(n).toFixed(2);
}

/* 🔥 GUARANTEED VISUAL FEEDBACK */
function ripple(e) {
  const r = document.createElement("div");
  r.className = "ripple";

  const x = e.clientX;
  const y = e.clientY;

  r.style.left = x - 40 + "px";
  r.style.top = y - 40 + "px";

  document.body.appendChild(r);

  setTimeout(() => r.remove(), 400);
}

/* attach ripple to ALL taps */
document.addEventListener("click", (e) => {
  if (e.target.tagName === "BUTTON") {
    ripple(e);
  }
});

function render() {
  document.getElementById("balance").innerText = format(balance);

  const list = document.getElementById("choreList");
  list.innerHTML = "";

  chores.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "chore";

    div.innerHTML = `
      <div class="left">
        <div class="count">${c.count || 0}</div>
        <div class="name">${c.name}</div>
        <div class="value">$${format(c.amount)}</div>
      </div>

      <div class="actions">
        <button onclick="add(${i})">+</button>
        <button onclick="remove(${i})">-</button>
        <button onclick="deleteChore(${i})">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });
}

/* ACTIONS */
function addChore() {
  const name = document.getElementById("name").value;
  const amount = parseFloat(document.getElementById("amount").value);
  if (!name || isNaN(amount)) return;

  chores.push({ name, amount, count: 0 });

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";

  save();
  render();
}

function add(i) {
  chores[i].count++;
  balance += chores[i].amount;
  save();
  render();
}

function remove(i) {
  if (chores[i].count > 0) {
    chores[i].count--;
    balance -= chores[i].amount;
  }
  save();
  render();
}

function deleteChore(i) {
  if (!confirm("Delete this chore?")) return;
  chores.splice(i, 1);
  save();
  render();
}

function resetDay() {
  if (!confirm("Reset everything for today?")) return;

  balance = 0;
  chores.forEach(c => c.count = 0);

  save();
  render();
}

function focusAdd() {
  document.getElementById("name").focus();
}

load();
render();
</script>

</body>
</html>
